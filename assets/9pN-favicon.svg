<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F2B46"/>
      <stop offset="100%" stop-color="#1A4A6E"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#00B4D8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="2" y="2" width="60" height="60" rx="14" ry="14" fill="url(#bg)"/>

  <!-- Simplified capability ring -->
  <circle cx="32" cy="30" r="22" fill="none" stroke="#00D4AA" stroke-opacity="0.2" stroke-width="3"/>

  <!-- 4 key domain dots (simplified from 8) -->
  <circle cx="32" cy="8" r="2.5" fill="#00D4AA" opacity="0.8"/>
  <circle cx="54" cy="30" r="2.5" fill="#00C4CC" opacity="0.7"/>
  <circle cx="32" cy="52" r="2.5" fill="#00BBDD" opacity="0.7"/>
  <circle cx="10" cy="30" r="2.5" fill="#00A5F0" opacity="0.6"/>

  <!-- "9P" text -->
  <text x="32" y="35" text-anchor="middle"
        font-family="'Inter', 'Helvetica Neue', Arial, sans-serif"
        font-size="20" font-weight="800" letter-spacing="-1"
        fill="white">9P</text>

  <!-- ".N" small badge -->
  <rect x="40" y="36" width="16" height="10" rx="5" ry="5" fill="url(#acc)" opacity="0.9"/>
  <text x="48" y="44" text-anchor="middle"
        font-family="'Inter', Arial, sans-serif"
        font-size="8" font-weight="700"
        fill="#0F2B46">.N</text>
</svg>
